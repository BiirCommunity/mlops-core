apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mlops

resources:
  - namespace.yaml
  - pvc.yaml
  - configmap.yaml
  - redis.yaml
  - minio.yaml
  - minio-init-job.yaml
  - mlflow.yaml
  - auth-service.yaml
  - app.yaml
  - admin-ui.yaml
  - chat-ui.yaml
  - prometheus.yaml
  - grafana.yaml
  - ingress.yaml
  - nodeports-observability.yaml

configMapGenerator:
  - name: grafana-dashboard-files
    namespace: mlops
    files:
      - llm.json=grafana/dashboards/llm.json
      - drift.json=grafana/dashboards/drift.json
