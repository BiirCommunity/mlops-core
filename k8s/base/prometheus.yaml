apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    rule_files:
      - /etc/prometheus/prometheus-rules.yml
    scrape_configs:
      - job_name: llm
        static_configs:
          - targets: ["app:8080"]
            labels:
              service: llm
  prometheus-rules.yml: |
    groups:
      - name: lm_aggregates
        rules:
          - record: prompt_length_chars_avg
            expr: prompt_length_chars_sum / prompt_length_chars_count
          - record: response_length_chars_avg
            expr: response_length_chars_sum / response_length_chars_count
          - record: request_latency_seconds_avg
            expr: request_latency_seconds_sum / request_latency_seconds_count
          - record: response_toxicity_score_avg
            expr: response_toxicity_score_sum / response_toxicity_score_count
          - record: response_json_valid_ratio
            expr: response_json_valid_total{status="valid"} / ignoring(status) sum(response_json_valid_total)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mlops
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: mlops
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
