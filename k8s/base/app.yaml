apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: mlops
  labels:
    app: app
spec:
  replicas: 1
  progressDeadlineSeconds: 7200
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      runtimeClassName: nvidia
      containers:
        - name: app
          image: mlops-core-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mlops-config
          env:
            - name: ADMIN_UI_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: mlops-platform-config
                  key: ADMIN_UI_ORIGINS
                  optional: true
            - name: MINIO_CONSOLE_URL
              valueFrom:
                configMapKeyRef:
                  name: mlops-platform-config
                  key: MINIO_CONSOLE_URL
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: HF_TOKEN
                  optional: true
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: ACCESS_TOKEN
            - name: INFERENCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: INFERENCE_API_KEY
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: models
              mountPath: /models
            - name: data
              mountPath: /app/data
            - name: reports
              mountPath: /app/reports
          resources:
            requests:
              memory: 8Gi
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: 32Gi
              cpu: "8"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
        - name: data
          persistentVolumeClaim:
            claimName: data-pvc
        - name: reports
          persistentVolumeClaim:
            claimName: reports-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: mlops
spec:
  selector:
    app: app
  ports:
    - port: 8080
      targetPort: 8080
