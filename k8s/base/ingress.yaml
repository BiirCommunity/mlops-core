apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlops-ingress
  namespace: mlops
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    # Доступ по IP без Host (http://192.168.x.x/admin и т.д.)
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 8080
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: chat-ui
                port:
                  number: 8080
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: mlops.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 8080
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: chat-ui
                port:
                  number: 8080
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: admin-ui-nodeport
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: admin-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ui-nodeport
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: chat-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30100
---
apiVersion: v1
kind: Service
metadata:
  name: app-nodeport
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800
