# Ingress (TLS, домен) — Helm chart mlops-core-secrets, параметры ingress.domain в Argo CD UI.
# NodePort-сервисы для прямого доступа без Ingress:
apiVersion: v1
kind: Service
metadata:
  name: admin-ui-nodeport
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: admin-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ui-nodeport
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: chat-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30100
---
apiVersion: v1
kind: Service
metadata:
  name: app-nodeport
  namespace: mlops
spec:
  type: NodePort
  selector:
    app: app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800
