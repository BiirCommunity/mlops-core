# TLS на Traefik; Argo CD по HTTP внутри кластера.
# Для одного домена с mlops — rootpath /argocd (UI: https://<домен>/argocd).
# Если Argo CD на отдельном поддомене — удалите server.rootpath и path /argocd в ingress.

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  server.insecure: "true"
  server.rootpath: "/argocd"
