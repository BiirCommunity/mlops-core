{{- if .Values.ingress.enabled }}
{{- $ns := .Release.Namespace }}
{{- $domain := .Values.ingress.domain }}
{{- $tlsSecret := .Values.ingress.tlsSecretName }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlops-ingress-admin
  namespace: {{ $ns }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: {{ $ns }}-strip-admin@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ $domain | quote }}
      secretName: {{ $tlsSecret }}
  rules:
    - host: {{ $domain | quote }}
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 8080
---
