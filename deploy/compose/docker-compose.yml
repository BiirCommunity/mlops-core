services:
  app:
    build: .
    container_name: llm
    env_file:
      - .env.docker.compose
    environment:
      - RUN_MODE=WEBSERVER
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8080
      - DEVICE=${DEVICE:-cuda}
      - CHECKPOINT_PATH=${CHECKPOINT_PATH:-/models/model.pt}
      - TOKENIZER_NAME=${TOKENIZER_NAME:-meta-llama/Meta-Llama-3-8B}
      - MAX_CONTEXT_TOKENS=${MAX_CONTEXT_TOKENS:-4096}
      - HF_TOKEN=${HF_TOKEN:-}
      - REDIS_URL=${REDIS_URL:-redis://redis-llm:6379}
      - MODEL_REVISION=${MODEL_REVISION:-}
      - TTT_STEPS=${TTT_STEPS:-5}
      - TTT_LR=${TTT_LR:-1e-3}
      - SESSION_TTL_SEC=${SESSION_TTL_SEC:-3600}
      - SESSION_LOCK_TTL_SEC=${SESSION_LOCK_TTL_SEC:-30}
      - SESSION_LOCK_BLOCKING_TIMEOUT_SEC=${SESSION_LOCK_BLOCKING_TIMEOUT_SEC:-10}
      - TTT_SAVE_EACH_STEP=${TTT_SAVE_EACH_STEP:-0}
      - TOXICITY_MODEL_NAME=${TOXICITY_MODEL_NAME:-unitary/multilingual-toxic-xlm-roberta}
      - TOXICITY_DEVICE=${TOXICITY_DEVICE:-cpu}
      - DRIFT_EMBEDDING_MODEL=${DRIFT_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      - DRIFT_EMBEDDING_DEVICE=${DRIFT_EMBEDDING_DEVICE:-cpu}
      - DRIFT_BASELINE_SIZE=${DRIFT_BASELINE_SIZE:-200}
      - DRIFT_WINDOW_SIZE=${DRIFT_WINDOW_SIZE:-100}
      - DRIFT_REPORT_DIR=${DRIFT_REPORT_DIR:-/app/reports/drift}
      - DRIFT_REPORT_INTERVAL_SEC=${DRIFT_REPORT_INTERVAL_SEC:-300}
      - DRIFT_REPORT_MIN_WINDOW_SAMPLES=${DRIFT_REPORT_MIN_WINDOW_SAMPLES:-10}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-llm-lora-posttrain}
      - MLFLOW_MODEL_NAME=${MLFLOW_MODEL_NAME:-llm-lora}
      - MLFLOW_UI_URL=${MLFLOW_UI_URL:-http://localhost:5000}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-0}
      - MINIO_BUCKET_MODELS=${MINIO_BUCKET_MODELS:-mlops-models}
      - MINIO_BUCKET_DATASETS=${MINIO_BUCKET_DATASETS:-mlops-datasets}
      - MINIO_CONSOLE_URL=${MINIO_CONSOLE_URL:-http://localhost:9001}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - TRAINING_DATA_DIR=${TRAINING_DATA_DIR:-/app/data/training}
      - TRAINING_JOBS_DIR=${TRAINING_JOBS_DIR:-/app/reports/training}
      - ADMIN_UI_ORIGINS=${ADMIN_UI_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - ADMIN_UI_URL=${ADMIN_UI_URL:-http://localhost:3000}
      - AUTH_SERVICE_URL=http://auth-service:8090
      - ACCESS_TOKEN=${ACCESS_TOKEN:-changeme-set-strong-token}
      - INFERENCE_API_KEY=${INFERENCE_API_KEY:-changeme-set-inference-api-key}
      - INTERACTION_LOG_DIR=${INTERACTION_LOG_DIR:-/app/reports/interactions}
      - REGISTER_BASE_MODEL_ON_STARTUP=${REGISTER_BASE_MODEL_ON_STARTUP:-1}
      - DVC_BUCKET=${DVC_BUCKET:-mlops-models}
      - DVC_PREFIX=${DVC_PREFIX:-dvc}
    volumes:
      - ${CKPT_HOST_DIR:-./models}:/models
      - ./data:/app/data
      - ./reports:/app/reports
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      - redis-llm
      - minio
      - mlflow
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  prometheus-llm:
    image: prom/prometheus:latest
    container_name: prometheus-llm
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-data-llm:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  grafana-llm:
    image: grafana/grafana-oss:latest
    container_name: grafana-llm
    ports:
      - "4345:3000"
    depends_on:
      - prometheus-llm
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data-llm:/var/lib/grafana
      - ./grafana-provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana-provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro

  redis-llm:
    image: redis:7-alpine
    container_name: redis-llm
    command: redis-server --appendonly no
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: minio-llm
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data-llm:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio-init-llm
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do sleep 1; done;
      mc mb --ignore-existing local/${MINIO_BUCKET_MODELS:-mlops-models};
      mc mb --ignore-existing local/${MINIO_BUCKET_DATASETS:-mlops-datasets};
      exit 0;
      "

  mlflow:
    build: ./docker/mlflow
    container_name: mlflow-llm
    depends_on:
      - minio
      - minio-init
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data-llm:/mlflow

  auth-service:
    build: ./auth-service
    container_name: auth-service-llm
    ports:
      - "${AUTH_SERVICE_PORT:-8090}:8090"
    environment:
      - AUTH_DATABASE_PATH=/data/auth.db
      - AUTH_BOOTSTRAP_USERNAME=${AUTH_BOOTSTRAP_USERNAME:-admin}
      - AUTH_BOOTSTRAP_PASSWORD=${AUTH_BOOTSTRAP_PASSWORD:-changeme}
      - AUTH_TOKEN_PREFIX=${AUTH_TOKEN_PREFIX:-mlops_}
    volumes:
      - auth-data-llm:/data

  chat-ui:
    build: ./chat-ui
    container_name: chat-ui-llm
    depends_on:
      - app
      - auth-service
    ports:
      - "${CHAT_UI_PORT:-3010}:8080"

  admin-ui:
    build: ./admin-ui
    container_name: admin-ui-llm
    depends_on:
      - app
    ports:
      - "${ADMIN_UI_PORT:-3000}:8080"
    environment:
      - VITE_API_BASE_URL=/v1/training
      - VITE_MLFLOW_UI_URL=${MLFLOW_UI_URL:-http://localhost:5000}

volumes:
  grafana-data-llm:
  prometheus-data-llm:
  minio-data-llm:
  mlflow-data-llm:
  auth-data-llm:
