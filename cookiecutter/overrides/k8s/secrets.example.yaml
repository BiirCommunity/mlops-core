# Скопируйте в secrets.yaml и заполните.
apiVersion: v1
kind: Secret
metadata:
  name: {{ cookiecutter.project_slug }}-secrets
  namespace: {{ cookiecutter.namespace }}
type: Opaque
stringData:
  HF_TOKEN: ""
  ACCESS_TOKEN: "changeme-set-strong-token"
  INFERENCE_API_KEY: "changeme-set-inference-api-key"
{% if cookiecutter.use_auth_service == "yes" %}
  AUTH_BOOTSTRAP_PASSWORD: "changeme-admin"
{% endif %}
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin"
{% if cookiecutter.use_monitoring == "yes" %}
  GF_SECURITY_ADMIN_USER: "admin"
  GF_SECURITY_ADMIN_PASSWORD: "admin"
{% endif %}
