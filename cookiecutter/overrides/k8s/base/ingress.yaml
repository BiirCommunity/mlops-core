apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ cookiecutter.project_slug }}-ingress
  namespace: {{ cookiecutter.namespace }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 8080
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: chat-ui
                port:
                  number: 8080
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
{% if cookiecutter.use_monitoring == "yes" %}
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
{% endif %}
    - host: {{ cookiecutter.ingress_host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: app
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 8080
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: chat-ui
                port:
                  number: 8080
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
{% if cookiecutter.use_monitoring == "yes" %}
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
{% endif %}
---
apiVersion: v1
kind: Service
metadata:
  name: admin-ui-nodeport
  namespace: {{ cookiecutter.namespace }}
spec:
  type: NodePort
  selector:
    app: admin-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: {{ cookiecutter.nodeport_admin }}
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ui-nodeport
  namespace: {{ cookiecutter.namespace }}
spec:
  type: NodePort
  selector:
    app: chat-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: {{ cookiecutter.nodeport_chat }}
---
apiVersion: v1
kind: Service
metadata:
  name: app-nodeport
  namespace: {{ cookiecutter.namespace }}
spec:
  type: NodePort
  selector:
    app: app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: {{ cookiecutter.nodeport_app }}
