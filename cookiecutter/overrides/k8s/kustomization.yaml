apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base

# Образы: ./scripts/k3s-build-images.sh → push в локальный registry
images:
  - name: {{ cookiecutter.project_slug }}-app
    newName: {{ cookiecutter.mlops_registry }}/{{ cookiecutter.project_slug }}-app
    newTag: {{ cookiecutter.mlops_image_tag }}
{% if cookiecutter.use_auth_service == "yes" %}
  - name: {{ cookiecutter.project_slug }}-auth-service
    newName: {{ cookiecutter.mlops_registry }}/{{ cookiecutter.project_slug }}-auth-service
    newTag: {{ cookiecutter.mlops_image_tag }}
{% endif %}
  - name: {{ cookiecutter.project_slug }}-admin-ui
    newName: {{ cookiecutter.mlops_registry }}/{{ cookiecutter.project_slug }}-admin-ui
    newTag: {{ cookiecutter.mlops_image_tag }}
  - name: {{ cookiecutter.project_slug }}-chat-ui
    newName: {{ cookiecutter.mlops_registry }}/{{ cookiecutter.project_slug }}-chat-ui
    newTag: {{ cookiecutter.mlops_image_tag }}
  - name: {{ cookiecutter.project_slug }}-mlflow
    newName: {{ cookiecutter.mlops_registry }}/{{ cookiecutter.project_slug }}-mlflow
    newTag: {{ cookiecutter.mlops_image_tag }}
