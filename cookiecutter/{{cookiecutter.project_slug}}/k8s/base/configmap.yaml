apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ cookiecutter.project_slug }}-config
  namespace: {{ cookiecutter.namespace }}
data:
  DEVICE: "cuda"
  CHECKPOINT_PATH: "/models/model.pt"
  TOKENIZER_NAME: "{{ cookiecutter.tokenizer_name }}"
  MAX_CONTEXT_TOKENS: "4096"
  REDIS_URL: "redis://redis:6379"
  TTT_STEPS: "5"
  TTT_LR: "1e-3"
  TTT_SAVE_EACH_STEP: "0"
  SESSION_TTL_SEC: "3600"
  SESSION_LOCK_TTL_SEC: "30"
  SESSION_LOCK_BLOCKING_TIMEOUT_SEC: "10"
  TOXICITY_MODEL_NAME: "unitary/multilingual-toxic-xlm-roberta"
  TOXICITY_DEVICE: "cpu"
  DRIFT_EMBEDDING_MODEL: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  DRIFT_EMBEDDING_DEVICE: "cpu"
  DRIFT_BASELINE_SIZE: "200"
  DRIFT_WINDOW_SIZE: "100"
  DRIFT_REPORT_DIR: "/app/reports/drift"
  DRIFT_REPORT_INTERVAL_SEC: "300"
  DRIFT_REPORT_MIN_WINDOW_SAMPLES: "10"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  MLFLOW_EXPERIMENT_NAME: "{{ cookiecutter.mlflow_experiment_name }}"
  MLFLOW_MODEL_NAME: "{{ cookiecutter.mlflow_model_name }}"
  MLFLOW_UI_URL: "{{ cookiecutter.mlops_public_url }}:{{ cookiecutter.nodeport_mlflow }}"
  MINIO_CONSOLE_URL: "{{ cookiecutter.mlops_public_url }}:{{ cookiecutter.nodeport_minio_console }}"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_SECURE: "0"
  MINIO_BUCKET_MODELS: "{{ cookiecutter.minio_bucket_models }}"
  MINIO_BUCKET_DATASETS: "{{ cookiecutter.minio_bucket_datasets }}"
  MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
  TRAINING_DATA_DIR: "/app/data/training"
  TRAINING_JOBS_DIR: "/app/reports/training"
  INTERACTION_LOG_DIR: "/app/reports/interactions"
  REGISTER_BASE_MODEL_ON_STARTUP: "1"
  DVC_BUCKET: "{{ cookiecutter.minio_bucket_models }}"
  DVC_PREFIX: "dvc"
{% if cookiecutter.use_auth_service == "yes" %}
  AUTH_SERVICE_URL: "http://auth-service:8090"
  AUTH_DATABASE_PATH: "/data/auth.db"
  AUTH_BOOTSTRAP_USERNAME: "admin"
  AUTH_TOKEN_PREFIX: "{{ cookiecutter.auth_token_prefix }}"
{% endif %}
  ADMIN_UI_ORIGINS: "http://localhost:{{ cookiecutter.nodeport_admin }},http://127.0.0.1:{{ cookiecutter.nodeport_admin }},{{ cookiecutter.mlops_public_url }}:{{ cookiecutter.nodeport_admin }},{{ cookiecutter.mlops_public_url }}:{{ cookiecutter.nodeport_chat }},{{ cookiecutter.mlops_public_url }}/admin,{{ cookiecutter.mlops_public_url }}/chat,http://{{ cookiecutter.lan_ip }}:{{ cookiecutter.nodeport_admin }},http://{{ cookiecutter.lan_ip }}:{{ cookiecutter.nodeport_chat }}"
  ADMIN_UI_URL: "{{ cookiecutter.mlops_public_url }}:{{ cookiecutter.nodeport_admin }}"
  RUN_MODE: "WEBSERVER"
  FASTAPI_HOST: "0.0.0.0"
  FASTAPI_PORT: "8080"
  VITE_API_BASE_URL: "/api"
  VITE_MLFLOW_UI_URL: "http://mlflow:5000"
