apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: {{ cookiecutter.namespace }}
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: {{ cookiecutter.project_slug }}-mlflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: {{ cookiecutter.project_slug }}-config
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ cookiecutter.project_slug }}-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ cookiecutter.project_slug }}-secrets
                  key: AWS_SECRET_ACCESS_KEY
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: {{ cookiecutter.namespace }}
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
