services:
  app:
    build: .
    container_name: llm
    environment:
      - RUN_MODE=WEBSERVER
      - FASTAPI_HOST=0.0.0.0
      - DEVICE=${DEVICE}
      - CHECKPOINT_PATH=${CHECKPOINT_PATH}
      - TOKENIZER_NAME=${TOKENIZER_NAME}
      - MAX_CONTEXT_TOKENS=${MAX_CONTEXT_TOKENS}
      - PORT=8080
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ${CKPT_HOST_PATH}:/models/finetuned2.pt:ro
    ports:
      - "${PORT}:8080"
    depends_on:
      - redis-llm
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  prometheus-llm:
    image: prom/prometheus:latest
    container_name: prometheus-llm
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana-llm:
    image: grafana/grafana-oss:latest
    container_name: grafana-llm
    env_file:
      - ./grafana/.env.grafana
    ports:
      - "4345:3000"
    depends_on:
      - prometheus-llm
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana-data-llm:/var/lib/grafana 
      - ./grafana-provisioning/dashboards:/var/lib/grafana/dashboards
      - ./grafana-provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro

  redis-llm:
    image: redis:7-alpine
    container_name: redis-llm
    command: redis-server --appendonly no
    ports:
      - "6379:6379"

volumes:
  grafana-data-llm: 