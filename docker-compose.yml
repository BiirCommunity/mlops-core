services:
  app:
    build: .
    container_name: llm
    env_file:
      - .env.docker.compose
    environment:
      - DEVICE=${DEVICE}
      - CHECKPOINT_PATH=${CHECKPOINT_PATH}
      - TOKENIZER_NAME=${TOKENIZER_NAME}
      - MAX_CONTEXT_TOKENS=${MAX_CONTEXT_TOKENS}
      - PORT=${PORT}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ${CKPT_HOST_PATH}:/models/model.pt:ro
    ports:
      - "${PORT}:8080"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  prometheus-llm:
    image: prom/prometheus:latest
    container_name: prometheus-llm
    env_file:
      - ./prometheus/.env.prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
    ports:
      - "${PORT}:9090"

  grafana-llm:
    image: grafana/grafana-oss:latest
    container_name: grafana-llm
    env_file:
      - ./grafana/.env.grafana
    ports:
      - "4345:3000"
    depends_on:
      - prometheus-llm
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning/dashboards:/var/lib/grafana/dashboards
      - ./grafana-provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro

volumes:
  grafana-data-llm: