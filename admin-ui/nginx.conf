server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location /api/users {
        rewrite ^/api/users(.*)$ /users$1 break;
        proxy_pass http://auth-service:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Access-Token $http_x_access_token;
    }

    location /api/api-keys {
        rewrite ^/api/api-keys(.*)$ /api-keys$1 break;
        proxy_pass http://auth-service:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Access-Token $http_x_access_token;
    }

    location /api/auth/ {
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass http://auth-service:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location = /api {
        rewrite ^ /v1/training/ break;
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /v1/training/$1 break;
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 100m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
