name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag for all services"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ARGOCD_SERVER: adaptive-llm.ru
  ARGOCD_ROOT_PATH: /argocd
  ARGOCD_APP_NAME: mlops-core
  ARGOCD_VERSION: v3.4.3

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Black
        run: uv run black --check .

      - name: Pylint app
        run: uv run pylint app

      - name: Pylint auth-service
        run: uv run pylint auth-service/auth_service

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mlops-core-app
            context: .
          - image: mlops-core-auth-service
            context: auth-service
          - image: mlops-core-admin-ui
            context: admin-ui
            build_args: VITE_MLFLOW_UI_URL=http://127.0.0.1:30500
          - image: mlops-core-chat-ui
            context: chat-ui
          - image: mlops-core-mlflow
            context: docker/mlflow
    steps:
      - uses: actions/checkout@v4

      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:ci
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mlops-core-app
            context: .
          - image: mlops-core-auth-service
            context: auth-service
          - image: mlops-core-admin-ui
            context: admin-ui
            build_args: VITE_MLFLOW_UI_URL=http://127.0.0.1:30500
          - image: mlops-core-chat-ui
            context: chat-ui
          - image: mlops-core-mlflow
            context: docker/mlflow
    steps:
      - uses: actions/checkout@v4

      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ inputs.tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy-argo:
    needs: publish
    runs-on: ubuntu-latest
    env:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
    steps:
      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x argocd
          ./argocd version --client

      - name: Update mlops-core image tags in Argo CD
        env:
          TAG: ${{ inputs.tag }}
          OWNER: ${{ steps.owner.outputs.owner }}
        run: |
          set -euo pipefail
          if [ -z "${ARGOCD_AUTH_TOKEN:-}" ]; then
            echo "ARGOCD_AUTH_TOKEN secret is not set in GitHub Actions"
            exit 1
          fi

          CLI=(./argocd
            --server "${ARGOCD_SERVER}"
            --auth-token "${ARGOCD_AUTH_TOKEN}"
            --grpc-web
            --grpc-web-root-path "${ARGOCD_ROOT_PATH}")

          SET_ARGS=()
          for img in app auth-service admin-ui chat-ui mlflow; do
            SET_ARGS+=(--kustomize-image "mlops-core-${img}=${REGISTRY}/${OWNER}/mlops-core-${img}:${TAG}")
          done

          echo "Setting image tag ${TAG} on Application ${ARGOCD_APP_NAME}..."
          "${CLI[@]}" app set "${ARGOCD_APP_NAME}" "${SET_ARGS[@]}"

          echo "Syncing ${ARGOCD_APP_NAME}..."
          "${CLI[@]}" app sync "${ARGOCD_APP_NAME}" --prune --timeout 900

          echo "Waiting for healthy..."
          "${CLI[@]}" app wait "${ARGOCD_APP_NAME}" --health --timeout 900

          "${CLI[@]}" app get "${ARGOCD_APP_NAME}"
