name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag for all services"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ARGOCD_SERVER: adaptive-llm.ru
  ARGOCD_ROOT_PATH: /argocd
  ARGOCD_APP_NAME: mlops-core
  ARGOCD_VERSION: v3.4.3

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Black
        run: uv run black --check .

      - name: Pylint app
        run: uv run pylint app

      - name: Pylint auth-service
        run: uv run pylint auth-service/auth_service

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mlops-core-app
            context: .
          - image: mlops-core-auth-service
            context: auth-service
          - image: mlops-core-admin-ui
            context: admin-ui
            build_args: |
              VITE_BASE_PATH=/admin/
              VITE_MLFLOW_UI_URL=/mlflow
              CACHEBUST=${{ github.sha }}
          - image: mlops-core-chat-ui
            context: chat-ui
            build_args: |
              VITE_BASE_PATH=/chat/
              CACHEBUST=${{ github.sha }}
          - image: mlops-core-mlflow
            context: docker/mlflow
    steps:
      - uses: actions/checkout@v4

      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:ci
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mlops-core-app
            context: .
          - image: mlops-core-auth-service
            context: auth-service
          - image: mlops-core-admin-ui
            context: admin-ui
            build_args: |
              VITE_BASE_PATH=/admin/
              VITE_MLFLOW_UI_URL=/mlflow
              CACHEBUST=${{ github.sha }}
          - image: mlops-core-chat-ui
            context: chat-ui
            build_args: |
              VITE_BASE_PATH=/chat/
              CACHEBUST=${{ github.sha }}
          - image: mlops-core-mlflow
            context: docker/mlflow
    steps:
      - uses: actions/checkout@v4

      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ inputs.tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy-argo:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.ARGOCD_SERVER }}${{ env.ARGOCD_ROOT_PATH }}/applications/${{ env.ARGOCD_APP_NAME }}
    env:
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
    steps:
      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${ARGOCD_VERSION}/argocd-linux-amd64"
          chmod +x argocd
          ./argocd version --client

      - name: Update mlops-core image tags in Argo CD
        env:
          TAG: ${{ inputs.tag }}
          OWNER: ${{ steps.owner.outputs.owner }}
        run: |
          set -euo pipefail
          if [ -z "${ARGOCD_AUTH_TOKEN:-}" ]; then
            echo "ARGOCD_AUTH_TOKEN secret is not set in GitHub Actions"
            exit 1
          fi

          CLI=(./argocd
            --server "${ARGOCD_SERVER}"
            --auth-token "${ARGOCD_AUTH_TOKEN}"
            --grpc-web
            --grpc-web-root-path "${ARGOCD_ROOT_PATH}")

          echo "Setting image tag ${TAG} on Application ${ARGOCD_APP_NAME}..."
          PATCH=$(jq -n \
            --arg tag "${TAG}" \
            --arg owner "${OWNER}" \
            --arg registry "${REGISTRY}" \
            '{
              spec: {
                source: {
                  kustomize: {
                    images: [
                      "\($registry)/\($owner)/mlops-core-app:\($tag)",
                      "\($registry)/\($owner)/mlops-core-auth-service:\($tag)",
                      "\($registry)/\($owner)/mlops-core-admin-ui:\($tag)",
                      "\($registry)/\($owner)/mlops-core-chat-ui:\($tag)",
                      "\($registry)/\($owner)/mlops-core-mlflow:\($tag)"
                    ]
                  }
                }
              }
            }')
          "${CLI[@]}" app patch "${ARGOCD_APP_NAME}" --type merge --patch "${PATCH}"

          echo "Syncing ${ARGOCD_APP_NAME}..."
          "${CLI[@]}" app sync "${ARGOCD_APP_NAME}" --prune --timeout 900

          echo "Waiting for sync..."
          "${CLI[@]}" app wait "${ARGOCD_APP_NAME}" --sync --timeout 600

          echo "Waiting for UI/API deployments..."
          for dep in admin-ui chat-ui auth-service mlflow; do
            "${CLI[@]}" app wait "${ARGOCD_APP_NAME}" \
              --resource "apps:Deployment:${dep}" --health --timeout 600
          done

          echo "Waiting for app (GPU, large image)..."
          if ! "${CLI[@]}" app wait "${ARGOCD_APP_NAME}" \
            --resource "apps:Deployment:app" --health --timeout 2400; then
            echo "::warning::app deployment not Healthy within 40m — tags are applied and sync succeeded"
            echo "::warning::check GPU, image pull, stuck Terminating pods: kubectl -n mlops get pods -l app=app"
            "${CLI[@]}" app get "${ARGOCD_APP_NAME}"
            exit 0
          fi

          "${CLI[@]}" app get "${ARGOCD_APP_NAME}"
