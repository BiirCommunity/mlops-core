name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag for all services"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Black
        run: uv run black --check .

      - name: Pylint app
        run: uv run pylint app

      - name: Pylint auth-service
        run: uv run pylint auth-service/auth_service

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mlops-core-app
            context: .
          - image: mlops-core-auth-service
            context: auth-service
          - image: mlops-core-admin-ui
            context: admin-ui
            build_args: VITE_MLFLOW_UI_URL=http://127.0.0.1:30500
          - image: mlops-core-chat-ui
            context: chat-ui
          - image: mlops-core-mlflow
            context: docker/mlflow
    steps:
      - uses: actions/checkout@v4

      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:ci
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mlops-core-app
            context: .
          - image: mlops-core-auth-service
            context: auth-service
          - image: mlops-core-admin-ui
            context: admin-ui
            build_args: VITE_MLFLOW_UI_URL=http://127.0.0.1:30500
          - image: mlops-core-chat-ui
            context: chat-ui
          - image: mlops-core-mlflow
            context: docker/mlflow
    steps:
      - uses: actions/checkout@v4

      - name: Image owner (lowercase for GHCR)
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ inputs.tag }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
